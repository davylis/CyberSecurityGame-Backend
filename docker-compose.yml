services:
  db:
    image: postgres:16
    container_name: unity_research_db
    restart: unless-stopped
    networks:
      - backend-internal
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    container_name: unity_research_backend
    restart: unless-stopped
    networks:
      - proxy
      - backend-internal
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}

volumes:
  postgres_data:

networks:
  proxy:
    external: true
  backend-internal: